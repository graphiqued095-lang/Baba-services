<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baba Design</title>

<style>
body {
  margin: 0;
  font-family: Montserrat, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #0183FF;
  color: white;
  padding: 20px;
  text-align: center;
}

/* SECTION */
section {
  padding: 40px;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  display: inline-block;
  width: 250px;
  vertical-align: top;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* BUTTON */
button {
  background: #FFE900;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* FORM */
form {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

</style>
</head>

<body>

<header>
  <h1>BABA DESIGN</h1>
  <p>Services | Formations | Templates</p>
</header>

<!-- SERVICES -->
<section>
  <h2>💼 Services</h2>

  <div class="card">
    <h3>Flyer</h3>
    <p>À partir de 3000 Gdes</p>
    <button onclick="selectService('Flyer')">Commander</button>
  </div>

  <div class="card">
    <h3>Logo</h3>
    <p>À partir de 5000 Gdes</p>
    <button onclick="selectService('Logo')">Commander</button>
  </div>

  <div class="card">
    <h3>Branding</h3>
    <p>Pack complet</p>
    <button onclick="selectService('Branding')">Commander</button>
  </div>
</section>

<!-- FORMATIONS -->
<section>
  <h2>🎓 Formations</h2>

  <div class="card">
    <h3>Pixellab Pro</h3>
    <p>4000 Gdes</p>
    <button onclick="selectService('Formation Canva')">S'inscrire</button>
  </div>

  <div class="card">
    <h3>Vidéographie</h3>
    <p>3000 Gdes</p>
    <button onclick="selectService('Formation Videographie')">S'inscrire</button>
  </div>
</section>

<!-- TEMPLATES -->
<section>
  <h2>🛒 Templates</h2>

  <div class="card">
    <h3>Calendrier</h3>
    <p>500 Gdes</p>
    <button onclick="selectService('Template Calendrier')">Acheter</button>
  </div>

  <div class="card">
    <h3>Badge</h3>
    <p>500 Gdes</p>
    <button onclick="selectService('Template Badge')">Acheter</button>
  </div>

  <div class="card">
    <h3>Certificat</h3>
    <p>700 Gdes</p>
    <button onclick="selectService('Template Certificat')">Acheter</button>
  </div>
</section>

<!-- FORMULAIRE -->
<section>
  <h2>📞 Commander</h2>

  <form onsubmit="sendToWhatsApp(); return false;">
    <input type="text" id="name" placeholder="Nom" required>
    <input type="text" id="phone" placeholder="Numéro" required>

    <select id="service">
      <option>Flyer</option>
      <option>Logo</option>
      <option>Branding</option>
      <option>Formation Pixellab</option>
      <option>Formation Videographie</option>
      <option>Template Calendrier</option>
      <option>Template Badge</option>
      <option>Template Certificat</option>
    </select>

    <textarea id="details" placeholder="Décrivez votre besoin"></textarea>

    <button type="submit">Envoyer sur WhatsApp</button>
  </form>
</section>

<script>
function selectService(serviceName) {
  document.getElementById("service").value = serviceName;
  window.scrollTo(0, document.body.scrollHeight);
}

function sendToWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let details = document.getElementById("details").value;

  let message = `Bonjour, je suis ${name}%0A
Numéro: ${phone}%0A
Service: ${service}%0A
Détails: ${details}`;

  let whatsappNumber = "50940052773"; // METE NUMERO PA W

  let url = `https://wa.me/${whatsappNumber}?text=${message}`;

  window.open(url, '_blank');
}
</script>

</body>
</html>
