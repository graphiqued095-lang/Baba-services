<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fòm Enskripsyon</title>

<style>
body {
    font-family: Montserrat, sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    border: 2px solid #000;
    border-radius: 10px;
}

h2 {
    text-align: center;
    color: #d40000;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #000;
    border-radius: 5px;
}

.checkbox {
    margin-top: 15px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    background: #d40000;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #a30000;
}

.whatsapp-btn {
    background: #000;
}
</style>
</head>

<body>

<div class="container">
    <h2>Fòm Enskripsyon</h2>

    <form id="form">

        <label>Non Konplè</label>
        <input type="text" id="nom" required>

        <label>Sèks</label>
        <select id="sexe">
            <option>Gason</option>
            <option>Fi</option>
        </select>

        <label>Ane ou fèt</label>
        <input type="number" id="anne" required>

        <label>Nivo Etid</label>
        <input type="text" id="nivo" required>

        <label>Kòd Ajan</label>
        <input type="text" id="kod">

        <label>Nimewo Telefòn</label>
        <input type="text" id="phone" required>

        <label>Mwayen pou touche kob</label>
        <select id="method">
            <option>Moncash</option>
            <option>Natcash</option>
        </select>

        <label>Non sou kont lan</label>
        <input type="text" id="nomkont" required>

        <label>Nimewo pou resevwa kob</label>
        <input type="text" id="numkont" required>

        <div class="checkbox">
            <input type="checkbox" id="paye">
            <label for="paye">Mwen peye deja</label>
        </div>

        <button type="button" onclick="envoyer()">Soumèt</button>
let url = "https://wa.me/50940052773?text=" + encodeURIComponent(message);
        <button type="button" class="whatsapp-btn" onclick="whatsapp()">
            Voye prèv via WhatsApp
        </button>

    </form>
</div>

<script>
function envoyer() {
    alert("Fòm nan voye avèk siksè!");
}

function whatsapp() {
    let nom = document.getElementById("nom").value;
    let phone = document.getElementById("phone").value;

    let message = `Bonjou, mwen se ${nom}. Men prèv peman mwen. Nimewo mwen: ${phone}`;

    let url = "https://wa.me/50940052773?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
