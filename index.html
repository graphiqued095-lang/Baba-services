<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enskripsyon Digital</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffffff, #f5f5f5);
}

.container {
    max-width: 500px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 15px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #ff0000;
}

label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: red;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.submit-btn {
    background: red;
    color: white;
}

.whatsapp-btn {
    background: black;
    color: white;
}

.checkbox {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Enskripsyon Digital</h2>

    <form id="form">

        <label>Non Konplè</label>
        <input type="text" id="nom" required>

        <label>Sèks</label>
        <select id="sexe">
            <option>Gason</option>
            <option>Fi</option>
        </select>

        <label>Ane ou fèt</label>
        <input type="number" id="anne" required>

        <label>Nivo Etid</label>
        <input type="text" id="nivo" required>

        <label>Kòd Ajan</label>
        <input type="text" id="kod">

        <label>Nimewo Telefòn</label>
        <input type="text" id="phone" required>

        <label>Mwayen pou touche kob</label>
        <select id="method">
            <option>Moncash</option>
            <option>Natcash</option>
        </select>

        <label>Non sou kont lan</label>
        <input type="text" id="nomkont" required>

        <label>Nimewo pou resevwa kob</label>
        <input type="text" id="numkont" required>

        <div class="checkbox">
            <input type="checkbox" id="paye">
            <label for="paye">Mwen peye deja</label>
        </div>

        <button type="button" class="submit-btn" onclick="sendWhatsApp()">
            Voye Enskripsyon
        </button>

    </form>
</div>

<script>
function sendWhatsApp() {

    let nom = document.getElementById("nom").value;
    let sexe = document.getElementById("sexe").value;
    let anne = document.getElementById("anne").value;
    let nivo = document.getElementById("nivo").value;
    let kod = document.getElementById("kod").value;
    let phone = document.getElementById("phone").value;
    let method = document.getElementById("method").value;
    let nomkont = document.getElementById("nomkont").value;
    let numkont = document.getElementById("numkont").value;
    let paye = document.getElementById("paye").checked ? "Wi" : "Non";

    let message =
`BONJOU 👋
MEN ENFÒMASYON MWEN:

👤 Non: ${nom}
⚧ Sèks: ${sexe}
🎂 Ane fèt: ${anne}
🎓 Nivo: ${nivo}
🧾 Kòd ajan: ${kod}

📱 Telefòn: ${phone}

💰 Metòd: ${method}
👤 Non kont: ${nomkont}
📲 Nimewo: ${numkont}

💳 Peye deja: ${paye}`;

    let url = "https://wa.me/50940052773?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
